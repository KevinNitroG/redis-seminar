<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="UIT Course & Student Manager — Redis Stack Demo with RedisJSON, RediSearch, and Streams">
  <title>UIT Manager — Redis Stack Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <!-- ─── Header ──────────────────────────────────────────────────── -->
    <header>
      <h1>🎓 UIT Course &amp; Student Manager</h1>
      <p>Redis Stack Demo — RedisJSON · RediSearch · Streams · Redis OM</p>
    </header>

    <!-- ─── Tabs ────────────────────────────────────────────────────── -->
    <nav class="tabs" id="main-tabs">
      <button class="tab-btn active" data-tab="students">👩‍🎓 Students</button>
      <button class="tab-btn" data-tab="courses">📚 Courses</button>
    </nav>

    <!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
    <!--  STUDENTS TAB                                                  -->
    <!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
    <section class="tab-panel active" id="panel-students">
      <!-- Stats -->
      <div class="stats-strip" id="student-stats">
        <div class="stat-card"><span class="stat-value" id="stat-total-students">—</span><span class="stat-label">Total Students</span></div>
        <div class="stat-card"><span class="stat-value" id="stat-avg-gpa">—</span><span class="stat-label">Avg GPA</span></div>
        <div class="stat-card"><span class="stat-value" id="stat-cohorts">—</span><span class="stat-label">Cohorts</span></div>
      </div>

      <!-- Toolbar -->
      <div class="toolbar">
        <div class="search-box">
          <input type="text" id="student-search" placeholder="Search students (name, username)..." autocomplete="off">
          <div class="suggestions" id="student-suggestions"></div>
        </div>
        <button class="btn btn-primary" id="btn-add-student">➕ Add Student</button>
      </div>

      <!-- Filters -->
      <div class="filter-row">
        <select id="filter-cohort">
          <option value="">All Cohorts</option>
        </select>
        <input type="number" id="filter-min-gpa" placeholder="Min GPA" step="0.1" min="0" max="10" style="width:100px">
        <input type="number" id="filter-max-gpa" placeholder="Max GPA" step="0.1" min="0" max="10" style="width:100px">
        <select id="filter-sort-student">
          <option value="gpa-desc">GPA ↓</option>
          <option value="gpa-asc">GPA ↑</option>
          <option value="name-asc">Name A→Z</option>
          <option value="name-desc">Name Z→A</option>
        </select>
        <button class="btn btn-secondary btn-sm" id="btn-filter-students">🔍 Filter</button>
        <button class="btn btn-secondary btn-sm" id="btn-reset-students">↻ Reset</button>
      </div>

      <!-- Student List -->
      <div id="student-list" class="card-grid">
        <div class="loading"><div class="spinner"></div></div>
      </div>
    </section>

    <!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
    <!--  COURSES TAB                                                   -->
    <!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
    <section class="tab-panel" id="panel-courses">
      <!-- Stats -->
      <div class="stats-strip" id="course-stats">
        <div class="stat-card"><span class="stat-value" id="stat-total-courses">—</span><span class="stat-label">Total Courses</span></div>
        <div class="stat-card"><span class="stat-value" id="stat-total-enrolled">—</span><span class="stat-label">Total Enrolled</span></div>
        <div class="stat-card"><span class="stat-value" id="stat-available-seats">—</span><span class="stat-label">Available Seats</span></div>
      </div>

      <!-- Toolbar -->
      <div class="toolbar">
        <div class="search-box">
          <input type="text" id="course-search" placeholder="Search courses (name, lecturer)..." autocomplete="off">
          <div class="suggestions" id="course-suggestions"></div>
        </div>
        <button class="btn btn-primary" id="btn-add-course">➕ Add Course</button>
      </div>

      <!-- Course List -->
      <div id="course-list" class="card-grid">
        <div class="loading"><div class="spinner"></div></div>
      </div>
    </section>
  </div>

  <!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
  <!--  MODALS                                                          -->
  <!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->

  <!-- Student Modal -->
  <div class="modal-overlay" id="student-modal">
    <div class="modal">
      <h2 id="student-modal-title">Add Student</h2>
      <form id="student-form">
        <input type="hidden" id="sf-mode" value="create">
        <div class="form-group">
          <label for="sf-id">Student ID (MSSV)</label>
          <input type="text" id="sf-id" placeholder="e.g. 23521476" required>
        </div>
        <div class="form-group">
          <label for="sf-username">Username</label>
          <input type="text" id="sf-username" placeholder="e.g. thiendp" required>
        </div>
        <div class="form-group">
          <label for="sf-name">Full Name</label>
          <input type="text" id="sf-name" placeholder="e.g. Dang Phu Thien" required>
        </div>
        <div class="form-group">
          <label for="sf-cohort">Cohort</label>
          <input type="text" id="sf-cohort" placeholder="e.g. 23" required>
        </div>
        <div class="form-group">
          <label for="sf-gpa">GPA</label>
          <input type="number" id="sf-gpa" placeholder="e.g. 9.2" step="0.1" min="0" max="10" required>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-secondary" onclick="closeModal('student-modal')">Cancel</button>
          <button type="submit" class="btn btn-primary" id="sf-submit">Create</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Course Modal -->
  <div class="modal-overlay" id="course-modal">
    <div class="modal">
      <h2 id="course-modal-title">Add Course</h2>
      <form id="course-form">
        <input type="hidden" id="cf-mode" value="create">
        <div class="form-group">
          <label for="cf-id">Course ID</label>
          <input type="text" id="cf-id" placeholder="e.g. SE332.Q21" required>
        </div>
        <div class="form-group">
          <label for="cf-name">Course Name</label>
          <input type="text" id="cf-name" placeholder="e.g. Chuyen de CSDL nang cao" required>
        </div>
        <div class="form-group">
          <label for="cf-lecturer">Lecturer Name</label>
          <input type="text" id="cf-lecturer" placeholder="e.g. Tran Thi Hong Yen" required>
        </div>
        <div class="form-group">
          <label for="cf-practice">Practice Topics (comma-separated)</label>
          <input type="text" id="cf-practice" placeholder="e.g. Redis, MongoDB, Cassandra">
        </div>
        <div class="form-group">
          <label for="cf-capacity">Capacity</label>
          <input type="number" id="cf-capacity" placeholder="e.g. 30" min="1" required>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-secondary" onclick="closeModal('course-modal')">Cancel</button>
          <button type="submit" class="btn btn-primary" id="cf-submit">Create</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Enroll Modal -->
  <div class="modal-overlay" id="enroll-modal">
    <div class="modal">
      <h2>Enroll Student</h2>
      <form id="enroll-form">
        <input type="hidden" id="ef-courseId">
        <div class="form-group">
          <label for="ef-studentId">Student ID (MSSV)</label>
          <input type="text" id="ef-studentId" placeholder="e.g. 23521476" required>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-secondary" onclick="closeModal('enroll-modal')">Cancel</button>
          <button type="submit" class="btn btn-primary">Enroll</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <script src="app.js"></script>
</body>
</html>
